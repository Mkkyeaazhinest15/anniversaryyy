<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For my Handsome Dinosaur 🦖💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  text-align:center;
  background:linear-gradient(#ffd6e7,#ffc0cb);
  overflow:hidden;
}

/* FLOATING HEARTS */
.heart{
  position:fixed;
  animation:floatUp 6s linear infinite;
  pointer-events:none;
}
@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0);}
  100%{transform:translateY(-10vh) scale(1.5);}
}

/* PAGES */
.page{display:none;opacity:0;transition:.4s;}
.active{display:block;opacity:1;}

/* BUTTON */
button{
  padding:12px 18px;
  margin:8px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,hotpink,#ff85a2);
  color:white;
  cursor:pointer;
}

/* CARDS */
.card{
  display:inline-block;
  padding:20px;
  margin:10px;
  background:white;
  border-radius:20px;
  cursor:pointer;
  min-width:130px;
}

/* 📖 FIXED BOOK */
.book{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:90%;
  max-width:320px;
  height:380px;
  perspective:1200px;
  z-index:999;
  transition:.4s;
}
.book.open{
  transform:translate(-50%,-50%) scale(1);
}

.pageBook{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:15px;
  background:#fff0f5;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
  backface-visibility:hidden;
}

/* COVER */
.left{
  background:linear-gradient(#ff9ecb,#ffc0cb);
  transform-origin:left;
  z-index:2;
}
.book.open .left{
  animation:openBook .8s forwards;
}
@keyframes openBook{
  to{transform:rotateY(-180deg);}
}

/* PAGE CONTENT */
.right{
  padding:20px;
  overflow:auto;
  font-size:14px;
  line-height:1.5;
}

/* GAME */
#gameArea{
  display:block;
  position:relative;
  height:350px;
  width:300px;
  background:white;
  margin:15px auto;
  border-radius:20px;
  overflow:hidden;
  border:3px solid black;
}

#player{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:35px;
  transition:0.1s;
}

.penguin{
  position:absolute;
  top:0;
  font-size:30px;
}

#score, #lives{
  font-size:20px;
}
</style>
</head>

<body>

<h2>🐧 Catch Game</h2>
<div id="score">Score: 0</div>
<div id="lives">Lives: 3</div>

<div id="gameArea">
  <div id="player">🧺</div>
</div>

<button onclick="startGame()">Start Game</button>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<audio id="catchSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<audio id="failSound">
  <source src="https://www.soundjay.com/button/beep-10.mp3">
</audio>

<script>
let player = document.getElementById("player");
let gameArea = document.getElementById("gameArea");
let scoreDisplay = document.getElementById("score");
let livesDisplay = document.getElementById("lives");

let score = 0;
let lives = 3;
let speed = 2;
let gameRunning = false;

// MOVE PLAYER
document.addEventListener("mousemove", e=>{
  let rect = gameArea.getBoundingClientRect();
  let x = e.clientX - rect.left;
  player.style.left = x + "px";
});

// START GAME
function startGame(){
  score = 0;
  lives = 3;
  speed = 2;
  gameRunning = true;

  document.getElementById("bgMusic").play();

  scoreDisplay.innerHTML = "Score: " + score;
  livesDisplay.innerHTML = "Lives: " + lives;

  spawnPenguin();
}

// SPAWN OBJECTS
function spawnPenguin(){
  if(!gameRunning) return;

  let penguin = document.createElement("div");
  penguin.classList.add("penguin");
  penguin.innerHTML = "🐧";

  penguin.style.left = Math.random()*260 + "px";
  gameArea.appendChild(penguin);

  fall(penguin);

  setTimeout(spawnPenguin, 1000 - speed*100);
}

// FALLING LOGIC
function fall(penguin){
  let pos = 0;

  let interval = setInterval(()=>{
    if(!gameRunning){
      clearInterval(interval);
      penguin.remove();
      return;
    }

    pos += speed;
    penguin.style.top = pos + "px";

    let playerRect = player.getBoundingClientRect();
    let penguinRect = penguin.getBoundingClientRect();

    // COLLISION
    if(
      penguinRect.bottom > playerRect.top &&
      penguinRect.left < playerRect.right &&
      penguinRect.right > playerRect.left
    ){
      document.getElementById("catchSound").play();

      score++;
      speed += 0.2;

      scoreDisplay.innerHTML = "Score: " + score;

      penguin.remove();
      clearInterval(interval);
    }

    // MISSED
    if(pos > 350){
      document.getElementById("failSound").play();

      lives--;
      livesDisplay.innerHTML = "Lives: " + lives;

      penguin.remove();
      clearInterval(interval);

      if(lives <= 0){
        gameOver();
      }
    }

  }, 20);
}

// GAME OVER
function gameOver(){
  gameRunning = false;
  document.getElementById("bgMusic").pause();
  alert("Game Over! Score: " + score);
}
  
/* HUG */
#hugScreen{
  display:none;
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#ffb6c1,#ff69b4);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:999;
}
#hugEmoji{
  font-size:100px;
  animation:heartbeat 1s infinite;
}
@keyframes heartbeat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

/* END */
#endingScreen{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(#ff9ecb,#ffc0cb);
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/04/19/audio_6f0c8d9c5e.mp3">
</audio>

<!-- START -->
<div id="page1" class="page active">
<h2>Do you still love me, my Handsome Dinosaur? 🥺💖</h2>
<button onclick="startSite()">YES 💖</button>
<button id="noBtn" onmouseover="runAway()">NO 😭</button>
</div>

<!-- MENU -->
<div id="cardsPage" class="page">
<h3>Choose one 💌</h3>
<div class="card" onclick="showLetter()">💌 Letter</div>
<div class="card" onclick="startGame()">🎮 Game</div>
<div class="card" onclick="hugStart()">🤗 Hug</div>
</div>

<!-- BOOK -->
<div id="book" class="book">
  <div class="pageBook right">
    <div id="letterText"></div>
    <button onclick="closeBook()">Close ❌</button>
  </div>
  <div class="pageBook left"></div>
</div>

<!-- GAME -->
<div id="gameArea">
<h3 id="scoreDisplay">Score: 0</h3>
<div id="player">🦖</div>
</div>

<!-- HUG -->
<div id="hugScreen">
<h1 id="hugEmoji">🫂</h1>
<p id="hugText">Hold to feel my hug 🥺💖</p>
</div>

<!-- END -->
<div id="endingScreen">
<h1>I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖</h1>
<button onclick="location.reload()">Restart</button>
</div>

<script>

/* FLOAT HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},600);

// START
function startSite(){
bgMusic.play().catch(()=>{});
page1.classList.remove("active");
cardsPage.classList.add("active");
}

// RUN BUTTON
function runAway(){
noBtn.style.position="absolute";
noBtn.style.left=Math.random()*80+"%";
noBtn.style.top=Math.random()*80+"%";
}

// LETTER
function showLetter(){
book.classList.add("open");

let text=`Hi my Handsomest Dinosaur 🦖💖

I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖

Like… not just a normal “I love you.”
I’m talking about the kind of love that feels like it stretches across galaxies,
the kind that doesn’t run out, doesn’t fade,
and only grows bigger and bigger every single day.

You are literally my favorite person in this entire universe.
Out of billions of people, ikaw yung pinili ng puso ko—
and I would choose you again and again,
in every lifetime, in every version of reality, in every possible world.

You make my days softer, lighter, and so much brighter.
Even the smallest things—your messages, your presence, your voice—
they mean EVERYTHING to me.
Parang kahit simpleng moment lang,
nagiging special basta ikaw yung kasama ko 🥺💗

You are my comfort when everything feels heavy,
my peace when my mind is too loud,
my safe place when the world feels too much.

And honestly?
I still get that same feeling every time I think about you—
butterflies, kilig, happiness…
like my heart is smiling in ways I can’t even explain.

I love the way you are.
Your little habits, your personality,
even the things you don’t notice about yourself—
I notice them, and I love every single part of you.

You’re not just someone I love…
you’re someone I treasure deeply.

If I could hug you right now,
I would never let go.
Like EVER.
As in forever na yakap.
No returns. No breaks. No escape 😤💖

And if one day everything feels hard,
I hope you remember this:
you have me.
Always.
No matter what happens,
no matter how far, how busy, or how messy things get—
I will still choose you.

Again.
And again.
And again.
Without hesitation.

Because loving you is the easiest,
most natural,
most beautiful thing I’ve ever felt.

I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖

Forever yours,
your little ms. lagtok 💖`;

let i=0;
letterText.innerHTML="";
function type(){
if(i<text.length){
letterText.innerHTML+=text[i++];
setTimeout(type,18);
}}
type();
}
function closeBook(){
book.classList.remove("open");
letterText.innerHTML="";
}

/* GAME */
let score=0,running=false;

function startGame(){
gameArea.style.display="block";
score=0;
running=true;
updateScore();
}

function updateScore(){
scoreDisplay.innerHTML="Score: "+score;
}

document.addEventListener("mousemove",e=>{
player.style.left=(e.clientX-20)+"px";
});
document.addEventListener("touchmove",e=>{
player.style.left=(e.touches[0].clientX-20)+"px";
});

setInterval(()=>{
if(!running)return;

let p=document.createElement("div");
p.className="penguin";
p.innerHTML="🐧";
p.style.left=Math.random()*90+"%";
gameArea.appendChild(p);

let fall=setInterval(()=>{
p.style.top=(p.offsetTop+5)+"px";

let pr=player.getBoundingClientRect();
let rr=p.getBoundingClientRect();

if(rr.bottom>=pr.top && rr.left<pr.right && rr.right>pr.left){
score++;updateScore();
p.remove();clearInterval(fall);

if(score==5){
running=false;
gameArea.style.display="none";
endingScreen.style.display="flex";
}
}

if(p.offsetTop>350){
p.remove();clearInterval(fall);
}
},30);

},800);

/* HUG */
let holdTimer;

function hugStart(){
hugScreen.style.display="flex";
document.body.addEventListener("mousedown",startHold);
document.body.addEventListener("mouseup",endHold);
document.body.addEventListener("touchstart",startHold);
document.body.addEventListener("touchend",endHold);
}

function startHold(){
hugText.innerHTML="Hugging you tighter... 🥺💖";
if(navigator.vibrate) navigator.vibrate([100,50,100]);
holdTimer=setInterval(spawnHearts,200);
}

function endHold(){
clearInterval(holdTimer);
hugText.innerHTML="I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖";
setTimeout(()=>hugScreen.style.display="none",1500);
}

function spawnHearts(){
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=Math.random()*100+"%";
h.style.top="100%";
h.style.animation="floatUp 3s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
}

</script>

</body>
</html>

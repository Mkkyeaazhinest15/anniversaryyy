<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For my Handsome Dinosaur 🦖💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  text-align:center;
  background:linear-gradient(#ffd6e7,#ffc0cb);
  overflow:hidden;
}

/* FLOATING HEARTS */
.heart{
  position:fixed;
  animation:floatUp 6s linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0);}
  100%{transform:translateY(-10vh) scale(1.5);}
}

/* PAGES */
.page{display:none;opacity:0;transition:0.5s;}
.active{display:block;opacity:1;}

/* BUTTON */
button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,hotpink,#ff85a2);
  color:white;
  cursor:pointer;
}
button:hover{transform:scale(1.1);}

/* CARDS */
.card{
  display:inline-block;
  padding:25px;
  margin:15px;
  background:white;
  border-radius:20px;
  cursor:pointer;
}

/* BOOK LETTER */
.book{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:300px;
  height:350px;
  display:flex;
  perspective:1000px;
  z-index:999;
  transition:0.5s;
}
.book.open{
  transform:translate(-50%,-50%) scale(1);
}
.pageBook{
  width:50%;
  height:100%;
  background:#fff0f5;
  border-radius:10px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
.left{
  transform-origin:right;
  background:linear-gradient(#ffc0cb,#ff9ecb);
}
.book.open .left{
  animation:openPage 0.8s forwards;
}
@keyframes openPage{
  from{transform:rotateY(0);}
  to{transform:rotateY(-180deg);}
}
.right{
  padding:15px;
  overflow:auto;
  font-size:14px;
}

/* GAME */
#gameArea{
  display:none;
  position:relative;
  height:400px;
  background:white;
  margin:20px;
  border-radius:20px;
}
#player{
  position:absolute;
  bottom:10px;
  left:50%;
  font-size:40px;
}
.penguin{
  position:absolute;
  top:0;
}

/* HUG */
#hugScreen{
  display:none;
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#ffb6c1,#ff69b4);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}
#hugEmoji{
  font-size:120px;
  animation:heartbeat 1s infinite;
}
@keyframes heartbeat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* END */
#endingScreen{
  display:none;
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(#ff9ecb,#ffc0cb);
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2023/04/19/audio_6f0c8d9c5e.mp3">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Do you still love me, my Handsome Dinosaur? 🥺💖</h2>
<button onclick="startSite()">YES 💖</button>
<button id="noBtn" onmouseover="runAway()">NO 😭</button>
</div>

<!-- MENU -->
<div id="cardsPage" class="page">
<h3>Choose one 💌</h3>
<div class="card" onclick="showLetter()">💌 Open Love Letter</div>
<div class="card" onclick="startGame()">🎮 Game</div>
<div class="card" onclick="hugStart()">🤗 Hug Me</div>
</div>

<!-- BOOK -->
<div id="book" class="book">
  <div class="pageBook left"></div>
  <div class="pageBook right">
    <div id="letterText"></div>
    <button onclick="closeBook()">Close ❌</button>
  </div>
</div>

<!-- GAME -->
<div id="gameArea">
<h3 id="scoreDisplay">Score: 0</h3>
<div id="player">🦖</div>
</div>

<!-- HUG -->
<div id="hugScreen">
<h1 id="hugEmoji">🫂</h1>
<p id="hugText">Hold to feel my hug 🥺💖</p>
</div>

<!-- END -->
<div id="endingScreen">
<h1>I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖</h1>
<button onclick="location.reload()">Restart</button>
</div>

<script>

/* FLOAT HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

// START
function startSite(){
bgMusic.play().catch(()=>{});
page1.classList.remove("active");
cardsPage.classList.add("active");
}

// RUN BUTTON
function runAway(){
noBtn.style.position="absolute";
noBtn.style.left=Math.random()*90+"%";
noBtn.style.top=Math.random()*90+"%";
}

// BOOK LETTER
function showLetter(){
book.classList.add("open");

let text=`Hi my Handsomest Dinosaur 🦖💖

I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖

You make everything feel lighter, warmer, and happier.
Even the smallest moments with you mean so much to me.

You are my comfort, my safe place,
and the one I always choose—every single day.

Thank you for loving me the way you do 🥺💗

Forever yours,
your little ms. lagtok 💖`;

let i=0;
letterText.innerHTML="";
function type(){
if(i<text.length){
letterText.innerHTML+=text[i++];
setTimeout(type,20);
}}
type();
}
function closeBook(){book.classList.remove("open");}

// GAME
let score=0,running=false;
function startGame(){
gameArea.style.display="block";
score=0;
running=true;
updateScore();
}
function updateScore(){
scoreDisplay.innerHTML="Score: "+score;
}
document.addEventListener("mousemove",e=>{
player.style.left=(e.clientX-20)+"px";
});
setInterval(()=>{
if(!running)return;
let p=document.createElement("div");
p.className="penguin";
p.innerHTML="🐧";
p.style.left=Math.random()*90+"%";
gameArea.appendChild(p);

let fall=setInterval(()=>{
p.style.top=(p.offsetTop+5)+"px";

let pr=player.getBoundingClientRect();
let rr=p.getBoundingClientRect();

if(rr.bottom>=pr.top && rr.left<pr.right && rr.right>pr.left){
score++;updateScore();p.remove();clearInterval(fall);
if(score==5){
running=false;
gameArea.style.display="none";
endingScreen.style.display="flex";
}
}

if(p.offsetTop>400){p.remove();clearInterval(fall);}
},30);
},800);

// HUG
let holdTimer;

function hugStart(){
hugScreen.style.display="flex";

document.body.addEventListener("mousedown",startHold);
document.body.addEventListener("mouseup",endHold);
document.body.addEventListener("touchstart",startHold);
document.body.addEventListener("touchend",endHold);
}

function startHold(){
hugText.innerHTML="Hugging you tighter... 🥺💖";

if(navigator.vibrate){
navigator.vibrate([100,50,100]);
}

holdTimer=setInterval(()=>spawnHearts(),200);
}

function endHold(){
clearInterval(holdTimer);
hugText.innerHTML="I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖";

setTimeout(()=>hugScreen.style.display="none",1500);
}

function spawnHearts(){
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="fixed";
h.style.left=Math.random()*100+"%";
h.style.top="100%";
h.style.animation="floatUp 3s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
}

</script>

</body>
</html>

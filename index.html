<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For my Handsome Dinosaur 🦖💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  text-align:center;
  background:linear-gradient(#ffd6e7,#ffc0cb);
  overflow:hidden;
}
.page{display:none;}
.active{display:block;}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,hotpink,#ff85a2);
  color:white;
  cursor:pointer;
}

.card{
  display:inline-block;
  padding:20px;
  margin:10px;
  background:white;
  border-radius:20px;
  cursor:pointer;
}

#letter{
  display:none;
  background:#fff0f5;
  margin:20px;
  padding:20px;
  border-radius:20px;
  height:250px;
  overflow:auto;
  white-space:pre-line;
}

#gameArea{
  display:none;
  position:relative;
  height:400px;
  background:white;
  margin:20px;
  border-radius:20px;
  overflow:hidden;
}

#player{
  position:absolute;
  bottom:10px;
  left:50%;
  font-size:35px;
}

.penguin{
  position:absolute;
  top:0;
  font-size:25px;
}

#endingScreen{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(#ff9ecb,#ffc0cb);
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC (BRUNO MARS VIBE) -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2023/04/19/audio_6f0c8d9c5e.mp3?filename=romantic-background-145823.mp3">
</audio>

<audio id="gameMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_946f2c1c63.mp3?filename=funny-game-112191.mp3">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Do you still love me, my Handsome Dinosaur? 🥺💖</h2>
<button onclick="startSite()">YES 💖</button>
<button id="noBtn" onmouseover="runAway()" ontouchstart="runAway()">NO 😭</button>
</div>

<!-- PAGE 2 -->
<div id="cardsPage" class="page">
<h3>Choose one 💌</h3>
<div class="card" onclick="showLetter()">💌 Open Letter</div>
<div class="card" onclick="startGame()">🎮 Play Game</div>
</div>

<!-- LETTER -->
<div id="letter">
<p id="letterText"></p>
<button onclick="closeLetter()">Close ❌</button>
</div>

<!-- GAME -->
<div id="gameArea">
<h3 id="score">Score: 0</h3>
<div id="player">🦖</div>
</div>

<!-- ENDING -->
<div id="endingScreen">
<h1>I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖</h1>
<p>Thank you for choosing me every day 🥺💖</p>
<button onclick="openYT()">🎵 Our Song</button>
<button onclick="location.reload()">Start Again 🔄</button>
</div>

<script>

// START
function startSite(){
bgMusic.volume=0.5;
bgMusic.play().catch(()=>{});
page1.classList.remove("active");
cardsPage.classList.add("active");
}

// RUNAWAY
function runAway(){
noBtn.style.position="absolute";
noBtn.style.left=Math.random()*(window.innerWidth-100)+"px";
noBtn.style.top=Math.random()*(window.innerHeight-50)+"px";
}

// LETTER
function showLetter(){
let text=`Hi my Handsomest Dinosaur 🦖💖

I LOVE YOU SAUR MUCH TO INFINITY AND BEYOND ♾️🚀💖

You are my favorite person. Always.

— your little ms. lagtok 💗`;

let i=0;
letter.style.display="block";
letterText.innerHTML="";

function type(){
if(i<text.length){
letterText.innerHTML+=text.charAt(i);
letter.scrollTop=letter.scrollHeight;
i++;
setTimeout(type,20);
}}
type();
}

function closeLetter(){ letter.style.display="none"; }

// GAME
let score=0,running=false;

function startGame(){
gameArea.style.display="block";
score=0;
running=true;
updateScore();

bgMusic.pause();
gameMusic.play();
}

function updateScore(){
scoreDisplay.innerHTML="Score: "+score;
}

document.addEventListener("mousemove",e=>{
player.style.left=(e.clientX-20)+"px";
});
document.addEventListener("touchmove",e=>{
player.style.left=(e.touches[0].clientX-20)+"px";
});

setInterval(()=>{
if(!running) return;

let p=document.createElement("div");
p.className="penguin";
p.innerHTML="🐧";
p.style.left=Math.random()*90+"%";
gameArea.appendChild(p);

let fall=setInterval(()=>{
p.style.top=(p.offsetTop+5)+"px";

let playerRect=player.getBoundingClientRect();
let pRect=p.getBoundingClientRect();

if(
pRect.bottom>=playerRect.top &&
pRect.left<playerRect.right &&
pRect.right>playerRect.left
){
score++;
updateScore();
p.remove();
clearInterval(fall);

if(score==5){
running=false;
gameMusic.pause();
bgMusic.play();

gameArea.style.display="none";
endingScreen.style.display="flex";
}
}

if(p.offsetTop>400){
p.remove();
clearInterval(fall);
}
},30);

},800);

// 🎵 YOUTUBE SONG
function openYT(){
window.open("https://www.youtube.com/watch?v=450p7goxZqg");
}

</script>

</body>
</html>
